- name: Open required Firewall ports
  ansible.posix.firewalld:
    port: "{{ item }}"
    state: enabled
    permanent: true
    immediate: true
  loop: "{{ zabbix_server_firewall_ports }}"

- name: Import GPG-Key
  ansible.builtin.rpm_key:
    state: present
    key: https://repo.zabbix.com/RPM-GPG-KEY-ZABBIX-B5333005

- name: Enable CRB repository for dependencies
  ansible.builtin.shell: dnf config-manager --set-enabled crb

- name: Install epel-release if not installed (Like on minimal AlmaLinux 9)
  ansible.builtin.dnf:
    name: 'https://dl.fedoraproject.org/pub/epel/epel-release-latest-9.noarch.rpm'
    state: present
    disable_gpg_check: true
    update_cache: true

- name: Remove release Zabbix package
  ansible.builtin.dnf:
    name: zabbix-release
    state: absent

- name: Install release Zabbix package
  ansible.builtin.dnf:
    name: 'https://repo.zabbix.com/zabbix/7.0/alma/9/x86_64/zabbix-release-latest-7.0.el9.noarch.rpm'
    state: present

- name: Clear dnf cache for system to re-read package lists
  ansible.builtin.shell: dnf clean all

- name: Disable Zabbix packages provided by EPEL (if exists)
  community.general.ini_file:
    path: /etc/yum.repos.d/epel.repo
    section: epel
    option: excludepkgs
    value: zabbix*
    state: present

- name: Install MariaDB server and related packages + Zabbix packages
  ansible.builtin.dnf:
    name:
      - mariadb-server
      - python3-PyMySQL # Нужен Ansible для работы с MySQL
      - zabbix-server-mysql
      - zabbix-web-mysql
      - zabbix-nginx-conf
      - zabbix-sql-scripts
      - zabbix-selinux-policy
      - zabbix-agent
      - glibc-langpack-en
    state: present
    enablerepo: zabbix

- name: Check if next block should ran or not
  ansible.builtin.stat:
    path: /var/lib/mysql/zabbix/triggers.ibd
  register: mariadb_base_created

- name: Block that makes playbook more stable in cases where user had previously installed mysql
  block:

    - name: Ensure MariaDB data directory is clean
      ansible.builtin.file:
        path: /var/lib/mysql
        state: absent

    - name: Recreate MariaDB data directory with correct permissions
      ansible.builtin.file:
        path: /var/lib/mysql
        state: directory
        owner: mysql
        group: mysql
        mode: '0755'

  when: not mariadb_base_created.stat.exists

- name: Start and enable MariaDB service
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: yes

- name: Wait for the unix socket file to be created
  ansible.builtin.wait_for:
    path: /var/lib/mysql/mysql.sock
    state: present

- name: Create Zabbix database
  community.mysql.mysql_db:
    name: zabbix
    encoding: utf8mb4
    collation: utf8mb4_bin
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock # Подключение без пароля от root

- name: Create Zabbix database user
  community.mysql.mysql_user:
    name: zabbix
    host: 'localhost'
    password: "{{ zabbix_db_password }}" # Безопасная переменная из Vault
    priv: 'zabbix.*:ALL' # Предоставляем все права на базу Zabbix
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock # Способ подключения к базе. Он говорит Ansible: "Не нужно подключаться по сети, подключайся напрямую к файлу сокета на этой же машине". Этот способ обычно используется для локальных соединений.

- name: Check if next block should run or not (checking if resulting directory of next block's execution is exists)
  ansible.builtin.stat:
    path: /var/lib/mysql/zabbix/triggers.ibd
  register: triggers

- name: Give privileges, import schema and data, take away privileges
  block:
    - name: Trust Zabbix with root privileges for db
      community.mysql.mysql_query:
        login_db: zabbix
       # login_user: zabbix # учетные данные для подключения к БД - здесь это не нужно, т.к. чтобы дать такие права нужно зайти под root и дать их, для этого можно не предоставлять лоигина и пароля и вход будет по умолчанию от root
       # login_password: "{{ zabbix_db_password }}" # учетные данные для подключения к БД
        login_unix_socket: /var/lib/mysql/mysql.sock
        query: set global log_bin_trust_function_creators = 1

    - name: Import Initial schema and data from zabbix user
      ansible.builtin.shell: zcat /usr/share/zabbix-sql-scripts/mysql/server.sql.gz | mysql --default-character-set=utf8mb4 -uzabbix -p'{{ zabbix_db_password }}' zabbix

    - name: Take away root privileges from zabbix user
      community.mysql.mysql_query:
        login_db: zabbix
        #login_user: zabbix
        #login_password: "{{ zabbix_db_password }}"
        login_unix_socket: /var/lib/mysql/mysql.sock
        query: set global log_bin_trust_function_creators = 0
  when: not triggers.stat.exists

- name: Zabbix server configuration using template
  ansible.builtin.template:
    src: zabbix_server.conf.j2
    dest: /etc/zabbix/zabbix_server.conf
    mode: '0644'
  notify: Restart zabbix-server

- name: Zabbix agent configuration using template
  ansible.builtin.template:
    src: zabbix_agentd.conf.j2
    dest: /etc/zabbix/zabbix_agentd.conf
    mode: '0644'
  notify: Restart zabbix-agent

- name: Create cert directory for nginx
  ansible.builtin.file:
    path: /etc/nginx/ssl/zabbix
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Copy zabbix http cert file to /etc/nginx/ssl/zabbix directory
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/fetched_files/zabbix-http.crt"
    dest: /etc/nginx/ssl/zabbix
    owner: root
    group: root
    mode: '0644'

- name: Copy zabbix http key file to /etc/nginx/ssl/zabbix directory
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/fetched_files/zabbix-http.key"
    dest: /etc/nginx/ssl/zabbix
    owner: root
    group: root
    mode: '0600'

- name: Set config file for zabbix web server
  ansible.builtin.template:
    src: zabbix.conf.j2
    dest: /etc/nginx/conf.d/zabbix.conf

- name: Making sure semanage and checkmodule is available on system
  ansible.builtin.dnf:
    name:
      - policycoreutils-python-utils
      - checkpolicy
    state: present

- name: Allowing nginx port in SELinux
  community.general.seport:
    ports: "{{ nginx_SELinux_port }}"
    proto: tcp
    setype: http_port_t
    state: present

- name: Allowing Zabbix Server/Agent ports in SELinux
  community.general.seport:
    ports: "{{ item }}"
    proto: tcp
    setype: zabbix_port_t
    state: present
  loop: "{{ zabbix_SELinux_ports }}"

- name: Copy SELinux text file on to machines
  ansible.builtin.copy:
    src: zabbix_agent_local.te
    dest: /tmp/
    mode: '0644'

- name: Check if zabbix_agent_local is in SEmodule list on system
  ansible.builtin.shell: |
    semodule -l | grep zabbix_agent_local
  register: zabbix_se
  ignore_errors: true
  changed_when: false

- name: Compile and integrate SELinux rules for zabbix
  ansible.builtin.shell: |
    checkmodule -M -m -o /tmp/zabbix_agent_local.mod /tmp/zabbix_agent_local.te
    semodule_package -o /tmp/zabbix_agent_local.pp -m /tmp/zabbix_agent_local.mod
    semodule -i /tmp/zabbix_agent_local.pp
  when: "'zabbix_agent_local' not in zabbix_se.stdout"

- name: Make sure zabbix-agent is started and enabled
  ansible.builtin.service:
    name: zabbix-agent
    state: started
    enabled: yes

- name: Make sure nginx is started and enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: yes

- name: Skip setup phase on zabbix web-interface by using config file
  ansible.builtin.template:
    src: zabbix.conf.php.j2
    dest: /etc/zabbix/web/zabbix.conf.php
    owner: apache
    group: apache
    mode: '0644'

